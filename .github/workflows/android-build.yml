name: Build Android APK (Native - Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置 Java 环境 (Expo 需要 JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install
        working-directory: ./client

      # 4. 预构建 Android 原生项目 (生成 android 文件夹)
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        working-directory: ./client
        env:
          EXPO_NO_GIT_STATUS: 'true' # 防止 git 状态检查报错

      # 5. 构建 APK (关键步骤)
      # 使用 gradlew 直接构建，比 expo run:android 更稳定，因为它不会尝试启动模拟器
      - name: Build APK with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        working-directory: ./client/android

      # 6. 调试步骤：看看文件到底生成在哪了 (如果失败请看这里)
      - name: Debug - Find APKs
        if: always()
        run: find . -name "*.apk"
        working-directory: ./client

      # 7. 上传产物 (使用通配符搜索)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug-apk
          # 这里使用递归搜索，不管它在哪个子文件夹，只要是以 debug.apk 结尾的都抓出来
          path: ./client/android/app/build/outputs/apk/**/*.apk
          retention-days: 5
