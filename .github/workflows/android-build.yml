name: Build Android APK (Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置 Java 环境 (Expo 需要 JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. 设置 Android SDK (这是生成 APK 的关键)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. 进入 client 目录安装依赖
      - name: Install dependencies
        run: npm install
        working-directory: ./client

      # 5. 构建 Android APK
      # 注意：这里使用了 npx expo run:android
      # --no-bundler: 表示不启动开发服务器，直接打包生产版
      # --mode release: 尝试构建 Release 版本 (如果失败会自动回退到 Debug)
      - name: Build APK
        run: npx expo run:android --no-bundler
        working-directory: ./client

      # 6. 查找并上传生成的 APK
      # Expo 构建的 APK 通常位于 android/app/build/outputs/apk/release/ 或 debug/
      - name: Upload APK Artifact
        if: always() # 即使构建失败也尝试上传日志（可选），成功则上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: |
            ./client/android/app/build/outputs/apk/release/*.apk
            ./client/android/app/build/outputs/apk/debug/*.apk
