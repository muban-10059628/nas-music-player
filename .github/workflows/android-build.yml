name: Build Android APK (CozeProj Mode)

on:
  workflow_dispatch: # 允许手动触发
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (如果需要)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 很多 Android 构建需要 Java 17

      - name: Grant execute permission for script
        run: chmod +x .cozeproj/scripts/prod_build.sh

      - name: Run Build Script
        run: bash .cozeproj/scripts/prod_build.sh

      # 注意：如果上面的脚本成功运行，它应该会生成 APK。
      # 你需要确认脚本生成的 APK 在哪里，然后上传它。
      # 假设它生成在根目录或者某个特定文件夹，这里做一个通用的上传尝试：
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: |
            **.apk
            app/build/outputs/apk/**/*.apk
