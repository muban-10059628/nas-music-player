# 工作流名称：构建 Android APK
name: Build Android APK

# 触发条件：仅当手动点击 "Run workflow" 按钮时触发
on:
  workflow_dispatch:

# 任务列表
jobs:
  build:
    # 运行环境：使用最新的 Ubuntu 服务器
    runs-on: ubuntu-latest

    # 步骤列表
    steps:
      # 1. 检出代码：把仓库里的代码下载下来
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js：因为 Expo 需要 Node 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 指定 Node 版本为 20

      # 3. 安装 Java (JDK)：Android 编译必须依赖 Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 使用 Temurin 发行版（最稳定）
          java-version: '17'      # 指定 Java 版本为 17

      # 4. 配置 Android SDK：自动下载安卓构建工具
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. 安装项目依赖
      - name: Install dependencies
        run: |
          npm install               # 安装根目录依赖
          cd client && npm install  # 进入 client 目录安装依赖
          cd ..                     # 回到根目录
          npm install -g expo-cli --force # 全局安装 Expo CLI

      # 6. 生成 Android 原生项目文件
      - name: Generate Android project
        run: |
          cd client                 # 进入 client 目录
          npx expo prebuild --platform android --clean # 生成 android 文件夹
          cd ..                     # 回到根目录

      # 7. 构建 APK 文件
      - name: Build debug APK
        run: |
          cd client/android         # 进入生成的 android 目录
          chmod +x gradlew          # 给构建脚本添加执行权限
          ./gradlew assembleDebug   # 开始编译 Debug 版本的 APK

      # 8. 上传产物：将生成的 APK 保存到 GitHub Actions 页面供下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug-apk    # 下载时的文件名
          path: client/android/app/build/outputs/apk/debug/app-debug.apk # APK 的具体路径
