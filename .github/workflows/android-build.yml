name: Build Android APK (Native - Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键修改 1：设置正确的 Node.js 版本，解决黄色警告
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # 使用稳定的 LTS 版本

      # 关键修改 2：设置 Java 环境 (Expo 需要 JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 关键修改 3：设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 关键修改 4：进入 client 目录安装依赖 (不再手动指定缓存路径，避免报错)
      - name: Install dependencies
        run: npm install
        working-directory: ./client

      # 关键修改 5：执行打包命令
      - name: Build Project
        run: npx expo run:android --no-bundler
        working-directory: ./client

      # 关键修改 6：上传生成的 APK
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./client/android/app/build/outputs/apk/debug/*.apk
